apiVersion: external-secrets.io/v1
kind: ExternalSecret

metadata:
  name: rstudio-secret
  namespace: data-science

spec:
  refreshInterval: 1h

  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore

  target:
    name: rstudio-secret
    creationPolicy: Owner

  data:
    - secretKey: password

      remoteRef:
        key: secret/rstudio
        property: password
